name: Types

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  types:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check types
        run: uv run mypy xlforge/
